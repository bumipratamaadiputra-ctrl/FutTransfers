<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 20 Klub Eropa 2026 - Transfermarkt Live</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #000000 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(90deg, #ff0000 0%, #cc0000 100%);
            padding: 1.5rem 0;
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #ff6666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            position: relative;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6666;
        }

        .clubs-grid {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(650px, 1fr));
            gap: 2rem;
        }

        .club-card {
            background: rgba(0,0,0,0.9);
            border: 2px solid rgba(255,0,0,0.3);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(15px);
            position: relative;
        }

        .club-card:hover {
            transform: translateY(-10px);
            border-color: #ff0000;
            box-shadow: 0 25px 50px rgba(255,0,0,0.4);
        }

        .club-header {
            background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .club-badge {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .club-info h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }

        .club-value {
            font-size: 1.1rem;
            color: #ffcc00;
            font-weight: 500;
        }

        .players-list {
            padding: 1.5rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background: rgba(255,0,0,0.05);
            border-radius: 12px;
            border-left: 4px solid #ff0000;
            transition: all 0.3s ease;
        }

        .player-item:hover {
            background: rgba(255,0,0,0.1);
            transform: translateX(5px);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .player-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6666, #ff0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .player-details h4 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
        }

        .player-pos {
            font-size: 0.85rem;
            color: #ff6666;
            text-transform: uppercase;
        }

        .player-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #00ff88;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #ff6666;
        }

        .last-updated {
            text-align: center;
            margin: 2rem 0;
            color: #ff6666;
            font-size: 0.9rem;
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(#ff0000, #cc0000);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .clubs-grid {
                grid-template-columns: 1fr;
                padding: 0 1rem;
            }
            
            .nav-container {
                padding: 0 1rem;
                flex-direction: column;
                gap: 1rem;
            }
            
            .player-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }
    </style>
</head>
<body>

                ]

            // Tambahkan 13 klub lainnya sesuai format yang sama

        Object.assign(clubsData, moreClubs);

        let lastUpdate = new Date();

        function formatCurrency(value) {
            return new Intl.NumberFormat('de-DE').format(value);
        }

        function updatePrices() {
            // Simulasi perubahan harga harian (1-5% random)
            Object.values(clubsData).forEach(club => {
                club.players.forEach(player => {
                    const change = (Math.random() - 0.5) * 0.1; // +/- 5%
                    const currentValue = parseFloat(player.value.replace(/[^\d]/g, '')) * 1000000;
                    const newValue = Math.max(1000000, currentValue * (1 + change));
                    player.value = `€${formatCurrency(Math.round(newValue / 1000000))}M`;
                });
            });
            renderClubs();
        }

        function renderClubs(filteredClubs = null) {
            const grid = document.getElementById('clubsGrid');
            const clubs = filteredClubs || Object.entries(clubsData);
            
            grid.innerHTML = clubs.map(([clubName, club]) => `
                <div class="club-card">
                    <div class="club-header">
                        <div class="club-badge">${club.badge}</div>
                        <div class="club-info">
                            <h3>${clubName}</h3>
                            <div class="club-value">Nilai Squad: ${club.value}</div>
                        </div>
                    </div>
                    <div class="players-list scrollbar">
                        ${club.players.map(player => `
                            <div class="player-item">
                                <div class="player-info">
                                    <div class="player-avatar">${player.name.charAt(0)}</div>
                                    <div class="player-details">
                                        <h4>${player.name}</h4>
                                        <div class="player-pos">${player.pos}</div>
                                    </div>
                                </div>
                                <div class="player-value">${player.value}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleString('id-ID');
            document.getElementById('lastUpdated').style.display = 'block';
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = Object.entries(clubsData).filter(([name]) => 
                name.toLowerCase().includes(query) || 
                Object.values(clubsData[name].players).some(p => 
                    p.name.toLowerCase().includes(query)
                )
            );
            renderClubs(filtered);
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                updateTimestamp();
                renderClubs();
            }, 1500);

            // Update setiap 24 jam (simulasi)
            setInterval(() => {
                updatePrices();
                updateTimestamp();
            }, 24 * 60 * 60 * 1000);

            // Update timestamp setiap menit
            setInterval(updateTimestamp, 60000);
        });

        // Add some interactive effects
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.club-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
        });
